<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Professional Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-dark">

    <div class="container">

        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center mb-4">



                <div class="card shadow-lg">

                    <div class="card-header text-center bg-primary text-white">

                        <h3>Calculator</h3>
                        <p>{Perform basic arithmetic operations using Spring Boot }</p>

                    </div>


                    <div class=" col-12 card-body">
                        <form th:action="@{/calculate}" method="post">

                            <input type="number" step="any" name="num1" class="form-control mb-2"
                                placeholder="First Number" required>

                            <input type="number" step="any" name="num2" class="form-control mb-2"
                                placeholder="Second Number" required>

                            <select name="opration" class="form-select mb-2">

                                <option value="+">Addition (+)</option>
                                <option value="-">Subtraction (-)</option>
                                <option value="*">Multiplication (×)</option>
                                <option value="/">Division (÷)</option>
                                <option value="%">Modulus (%)</option>

                            </select>

                            <button class="btn btn-success w-100">
                                Calculate
                            </button>

                        </form>
                        <h4 class="text-success mt-3" th:if="${result!=null}">
                            Result :
                            <span name="result" th:text="${result}"></span>
                        </h4>

                        <h4 class="text-danger mt-3" th:if="${error!=null}">
                            <span th:text="${error}"></span>
                        </h4>
                        <a href="/history" class="btn btn-success w-100 h-50 m-3"> History</a>
                    </div>
                </div>
            </div>



            <div class="col-md-6">

                <div class="card shadow-lg">

                    <div class="card-header text-center bg-primary text-white">

                        <h3>Calculator</h3>
                        <p>Perform basic arithmetic operations using Spring Boot in main logic for javaScript</p>
                    </div>


                    <div class=" col-12 card-body">


                        <input type="text" id="display" class="form-control form-control-lg text-end" readonly
                            title="Calculator display" aria-label="Calculator display">

                        <br>
                        <div class="row mb-2">

                            <div class="col-2">
                                <button class="btn btn-info w-100" onclick="percent()">%</button>
                            </div>

                            <div class="col-2">
                                <button class="btn btn-info w-100" onclick="squareRoot()">√</button>
                            </div>

                            <div class="col-2">
                                <button class="btn btn-info w-100" onclick="square()">x²</button>
                            </div>

                            <div class="col-3">
                                <button class="btn btn-info w-100" onclick="reciprocal()">1/x</button>
                            </div>

                            <div class="col-3">
                                <button class="btn btn-info w-100" onclick="plusMinus()">±</button>
                            </div>

                        </div>

                        <div class="row">

                            <div class=" col-3"><button class="btn btn-secondary w-100"
                                    onclick="clearDisplay()">C</button></div>

                            <div class="col-3"><button class="btn btn-secondary w-100" onclick="backspace()">CE</button>
                            </div>

                            <div class="col-3"><button class="btn btn-secondary w-100" onclick="backspace()">⌫</button>
                            </div>

                            <div class="col-3"><button class="btn btn-warning w-100"
                                    onclick="appendValue('÷')">÷</button></div>

                        </div>

                        <br>

                        <div class="row">

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('7')">7</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('8')">8</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('9')">9</button>
                            </div>

                            <div class="col-3"><button class="btn btn-warning w-100"
                                    onclick="appendValue('x')">×</button></div>

                        </div>

                        <br>

                        <div class="row">

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('4')">4</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('5')">5</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('6')">6</button>
                            </div>

                            <div class="col-3"><button class="btn btn-warning w-100"
                                    onclick="appendValue('-')">-</button></div>

                        </div>

                        <br>

                        <div class="row">

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('1')">1</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('2')">2</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('3')">3</button>
                            </div>

                            <div class="col-3"><button class="btn btn-warning w-100"
                                    onclick="appendValue('+')">+</button></div>

                        </div>

                        <br>

                        <div class="row">

                            <div class="col-6"><button class="btn btn-light w-100" onclick="appendValue('0')">0</button>
                            </div>

                            <div class="col-3"><button class="btn btn-light w-100" onclick="appendValue('.')">.</button>
                            </div>

                            <div class="col-3"><button class="btn btn-success w-100" onclick="calculate()">=</button>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <script th:src="@{/js/script.js}"></script>
</body>

</html>
