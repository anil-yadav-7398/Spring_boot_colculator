<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <div class="container mt-5">

        <h2 class="justify-content-center ">Calculation History</h2>

        <table class="table table-bordered  ">

            <thead clss="table-dark ">

                <tr>

                    <th>ID</th>

                    <th>Number 1</th>

                    <th>Operation</th>

                    <th>Number 2</th>

                    <th>Result</th>

                    <th>Date</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="h : ${historyList}">

                    <td th:text="${h.id}"></td>

                    <td th:text="${h.num1}"></td>

                    <td th:text="${h.opration}"></td>

                    <td th:text="${h.num2}"></td>

                    <td th:text="${h.result}"></td>

                    <td th:text="${h.createAt}"></td>
                    <td>
                        <a th:href="@{/delete/{id}(id=${h.id})}" class="btn btn-danger btn-sm">Delete</a>

                    </td>
                </tr>

            </tbody>

        </table>
        <a href="/" class="btn btn-primary">Back to Calculator</a>

    </div>

</body>

</html>
